[services.autoapply.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.autoapply.deploy]
startCommand = "node dist/main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.gentle-flow.build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile"

[services.gentle-flow.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.career-autopilot.build]
builder = "DOCKERFILE"
dockerfilePath = "python-backend/Dockerfile"

[services.career-autopilot.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
